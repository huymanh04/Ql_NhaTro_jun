name: SonarCloud

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner begin /k:"trantrongphuc1_qlynhatro" /o:"trantrongphuc1" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.cs.opencover.reportsPaths="TestResults/coverage.opencover.xml" /d:sonar.cs.vstest.reportsPaths="TestResults/test-results.trx" /d:sonar.qualitygate.wait=false

      - name: Build
        run: dotnet build Ql_NhaTro_jun.sln --no-restore --configuration Release

      - name: Run Unit Tests + coverage
        run: dotnet test Ql_NhaTro_jun.Tests/Ql_NhaTro_jun.Tests.csproj --no-build --configuration Release --results-directory "${{ github.workspace }}/TestResults" --logger "trx;LogFileName=test-results.trx" /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput="${{ github.workspace }}/TestResults/coverage.opencover.xml"


      - name: Verify Sonar report files
        shell: pwsh
        run: |
          if (!(Test-Path "${{ github.workspace }}/TestResults/test-results.trx")) {
            Write-Error "Missing TRX report file"
          }
          if (!(Test-Path "${{ github.workspace }}/TestResults/coverage.opencover.xml")) {
            Write-Error "Missing OpenCover report file"
          }
          Get-ChildItem "${{ github.workspace }}/TestResults" -File | Format-Table Name, Length -AutoSize

      - name: End SonarCloud analysis
        if: always()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

 